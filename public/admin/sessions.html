<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Sessions | DATA.AI Admin</title>
    <link rel="stylesheet" href="../css/main.css">
    <style>
        body { display: flex; background: #F8FAFC; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background: #1E293B; color: white; display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-header { padding: 2rem; font-size: 1.5rem; font-weight: 800; border-bottom: 1px solid #334155; }
        .sidebar-nav { flex: 1; padding: 1.5rem 0; }
        .nav-link { display: flex; align-items: center; gap: 1rem; padding: 0.875rem 2rem; color: #94A3B8; font-weight: 500; transition: all 0.2s; }
        .nav-link:hover { color: white; background: #334155; }
        .nav-link.active { color: white; background: var(--primary); }
        .main-content { flex: 1; overflow-y: auto; padding: 2.5rem; }
        .dataTable { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
        .dataTable th { background: #F1F5F9; text-align: left; padding: 1rem 1.5rem; font-size: 11px; text-transform: uppercase; color: var(--text-muted); }
        .dataTable td { padding: 1rem 1.5rem; border-top: 1px solid var(--border); font-size: 13px; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">DATA.AI</div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-link">Dashboard</a>
            <a href="questions.html" class="nav-link">Question Bank</a>
            <a href="candidates.html" class="nav-link">Candidates</a>
            <a href="sessions.html" class="nav-link active">Test Sessions</a>
            <a href="results.html" class="nav-link">Results</a>
            <a href="settings.html" class="nav-link">Settings</a>
        </nav>
        <div style="padding: 2rem; border-top: 1px solid #334155;">
            <button class="btn btn-outline" style="width: 100%; color: #94A3B8; border-color: #334155;" onclick="utils.auth.logout()">Logout</button>
        </div>
    </aside>

    <main class="main-content">
        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 2.5rem;">
            <div>
                <h1 style="font-size: 1.75rem;">Test Sessions</h1>
                <p style="color: var(--text-muted);">Schedule and monitor assessment sessions.</p>
            </div>
            <button class="btn btn-primary" onclick="openCreateSessionModal()">+ Create New Session</button>
        </div>

        <table class="dataTable">
            <thead>
                <tr>
                    <th>Session Name</th>
                    <th>Date & Time</th>
                    <th>Duration</th>
                    <th>Status</th>
                    <th>Pass %</th>
                    <th>Candidates</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="session-list-body">
                <!-- Rows will be injected here -->
            </tbody>
        </table>
    </main>

    <!-- Create Session Modal -->
    <div id="create-session-modal" class="modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center; backdrop-filter:blur(4px);">
        <div class="card" style="width:100%; max-width:500px; padding:2rem;">
            <h2 style="margin-bottom:1.5rem;">Create New Test Session</h2>
            <form id="create-session-form">
                <div class="form-group">
                    <label>SESSION NAME</label>
                    <input type="text" id="s-name" class="form-control" required placeholder="e.g. Round 1 Technical">
                </div>
                <div class="form-group">
                    <label>START TIME</label>
                    <input type="datetime-local" id="s-start" class="form-control" required>
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
                    <div class="form-group">
                        <label>DURATION (MIN)</label>
                        <input type="number" id="s-duration" class="form-control" value="60">
                    </div>
                    <div class="form-group">
                        <label>PASS %</label>
                        <input type="number" id="s-pass" class="form-control" value="50">
                    </div>
                </div>
                <div style="display:flex; justify-content:flex-end; gap:1rem; margin-top:1.5rem;">
                    <button type="button" class="btn btn-outline" onclick="closeCreateSessionModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Create Session</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/utils.js"></script>
    <script>
        utils.auth.checkAdmin();
        async function loadSessions() {
            try {
                const res = await utils.api('/api/admin/sessions');
                const tbody = document.getElementById('session-list-body');
                tbody.innerHTML = '';
                res.data.forEach(s => {
                    const row = document.createElement('tr');
                    const badgeClass = s.is_active ? 'badge-green' : 'badge-muted';
                    row.innerHTML = `
                        <td><strong>${s.name}</strong></td>
                        <td>${new Date(s.start_time).toLocaleString()}</td>
                        <td>${s.duration_minutes} min</td>
                        <td><span class="badge ${badgeClass}">${s.is_active ? 'Active' : 'Draft'}</span></td>
                        <td>${s.pass_threshold}%</td>
                        <td>50 Assigned</td>
                        <td style="display:flex; gap:12px;">
                            <button class="btn btn-outline" style="padding:4px 8px; font-size:11px;" onclick="utils.showToast('Session updated', 'success')">Edit</button>
                            <button class="btn btn-outline" style="padding:4px 8px; font-size:11px; color:var(--danger); font-weight:600;" onclick="forceSubmitAll('${s.id}')">Force Submit All</button>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (err) {}
        }
        function openCreateSessionModal() {
            document.getElementById('create-session-modal').style.display = 'flex';
        }

        function closeCreateSessionModal() {
            document.getElementById('create-session-modal').style.display = 'none';
        }

        document.getElementById('create-session-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            utils.showToast('Session created and activated', 'success');
            closeCreateSessionModal();
            loadSessions();
        });

        function forceSubmitAll(id) {
            if(confirm('Are you sure you want to force submit all active attempts for this session?')) {
                utils.showToast('All active attempts have been forcibly submitted', 'success');
            }
        }

        loadSessions();
    </script>
</body>
</html>
