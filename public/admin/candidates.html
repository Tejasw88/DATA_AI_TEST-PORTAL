<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidates | DATA.AI Admin</title>
    <link rel="stylesheet" href="../css/main.css">
    <style>
        body { display: flex; background: #F8FAFC; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 260px; background: #1E293B; color: white; display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-header { padding: 2rem; font-size: 1.5rem; font-weight: 800; border-bottom: 1px solid #334155; }
        .sidebar-nav { flex: 1; padding: 1.5rem 0; }
        .nav-link { display: flex; align-items: center; gap: 1rem; padding: 0.875rem 2rem; color: #94A3B8; font-weight: 500; transition: all 0.2s; }
        .nav-link:hover { color: white; background: #334155; }
        .nav-link.active { color: white; background: var(--primary); }

        .main-content { flex: 1; overflow-y: auto; padding: 2.5rem; }
        .dataTable { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
        .dataTable th { background: #F1F5F9; text-align: left; padding: 1rem 1.5rem; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); }
        .dataTable td { padding: 1rem 1.5rem; border-top: 1px solid var(--border); font-size: 13px; }
        .badge { font-size: 10px; padding: 2px 6px; }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">DATA.AI</div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-link">Dashboard</a>
            <a href="questions.html" class="nav-link">Question Bank</a>
            <a href="candidates.html" class="nav-link active">Candidates</a>
            <a href="sessions.html" class="nav-link">Test Sessions</a>
            <a href="results.html" class="nav-link">Results</a>
            <a href="settings.html" class="nav-link">Settings</a>
        </nav>
        <div style="padding: 2rem; border-top: 1px solid #334155;">
            <button class="btn btn-outline" style="width: 100%; color: #94A3B8; border-color: #334155;" onclick="utils.auth.logout()">Logout</button>
        </div>
    </aside>

    <main class="main-content">
        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 2.5rem;">
            <div>
                <h1 style="font-size: 1.75rem;">Candidate Management</h1>
                <p style="color: var(--text-muted);">View, register, and track candidate progress.</p>
            </div>
            <div style="display:flex; gap:10px;">
                <button class="btn btn-outline" onclick="utils.showToast('CSV Upload coming soon', 'info')">Bulk CSV Import</button>
                <button class="btn btn-primary" onclick="openAddCandidateModal()">+ Register Candidate</button>
            </div>
        </div>

        <table class="dataTable">
            <thead>
                <tr>
                    <th>Username</th>
                    <th>Full Name</th>
                    <th>Domain</th>
                    <th>Level</th>
                    <th>Session</th>
                    <th>Status</th>
                    <th>Violations</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="candidate-list-body">
                <!-- Rows will be injected here -->
            </tbody>
        </table>
    </main>

    <!-- Add Candidate Modal -->
    <div id="add-candidate-modal" class="modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center; backdrop-filter:blur(4px);">
        <div class="card" style="width:100%; max-width:500px; padding:2rem;">
            <h2 style="margin-bottom:1.5rem;">Register New Candidate</h2>
            <form id="add-candidate-form">
                <div class="form-group">
                    <label>USERNAME</label>
                    <input type="text" id="c-username" class="form-control" required placeholder="e.g. tejasw_2026">
                </div>
                <div class="form-group">
                    <label>FULL NAME</label>
                    <input type="text" id="c-fullname" class="form-control" required placeholder="e.g. Tejasw Kumar">
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
                    <div class="form-group">
                        <label>DOMAIN</label>
                        <select id="c-domain" class="form-control">
                            <option value="Frontend">Frontend</option>
                            <option value="Backend">Backend</option>
                            <option value="Database">Database</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>DIFFICULTY</label>
                        <select id="c-difficulty" class="form-control">
                            <option value="Easy">Easy</option>
                            <option value="Medium">Medium</option>
                            <option value="Hard">Hard</option>
                        </select>
                    </div>
                </div>
                <div style="display:flex; justify-content:flex-end; gap:1rem; margin-top:1.5rem;">
                    <button type="button" class="btn btn-outline" onclick="closeAddCandidateModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Register</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../js/utils.js"></script>
    <script>
        utils.auth.checkAdmin();

        async function loadCandidates() {
            try {
                const res = await utils.api('/api/admin/candidates');
                const tbody = document.getElementById('candidate-list-body');
                tbody.innerHTML = '';

                res.data.forEach(c => {
                    const row = document.createElement('tr');
                    const statusClass = c.status === 'Submitted' ? 'badge-green' : (c.status === 'In Progress' ? 'badge-blue' : (c.status === 'Violated' ? 'badge-red' : 'badge-muted'));
                    
                    row.innerHTML = `
                        <td><strong>${c.username}</strong></td>
                        <td>${c.full_name || 'N/A'}</td>
                        <td>${c.domain || 'N/A'}</td>
                        <td style="font-weight: 600;">${c.difficulty}</td>
                        <td style="color:#64748B">${c.session_name || 'N/A'}</td>
                        <td><span class="badge ${statusClass}">${c.status}</span></td>
                        <td style="color: ${c.violation_count > 0 ? 'var(--danger)' : 'inherit'}; font-weight:700">${c.violation_count}</td>
                        <td style="display:flex; gap:12px;">
                            <button class="btn btn-outline" style="padding:4px 8px; font-size:11px;" onclick="viewAnalytics('${c.username}')">Analytics</button>
                            <button class="btn btn-outline" style="padding:4px 8px; font-size:11px;" onclick="resetCandidate('${c.username}')">Reset</button>
                            <button class="btn btn-outline" style="padding:4px 8px; font-size:11px; color:var(--danger);" onclick="deleteCandidate('${c.username}')">Delete</button>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (err) {
                // Handled
            }
        }

        function openAddCandidateModal() {
            document.getElementById('add-candidate-modal').style.display = 'flex';
        }

        function closeAddCandidateModal() {
            document.getElementById('add-candidate-modal').style.display = 'none';
        }

        document.getElementById('add-candidate-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                username: document.getElementById('c-username').value,
                fullName: document.getElementById('c-fullname').value,
                domain: document.getElementById('c-domain').value,
                difficulty: document.getElementById('c-difficulty').value,
                password: 'password123' // Default
            };
            
            try {
                const res = await utils.api('/api/admin/candidates', 'POST', payload);
                utils.showToast(res.message || `Candidate ${payload.username} registered (default pwd: password123)`, 'success');
                closeAddCandidateModal();
                loadCandidates();
            } catch (err) {
                utils.showToast(err.message || 'Failed to register candidate', 'error');
            }
        });

        function viewAnalytics(username) {
            utils.showToast(`Analytics for ${username} coming soon`, 'info');
        }

        function resetCandidate(username) {
            if(confirm(`Reset exam for ${username}?`)) {
                utils.showToast(`${username} has been reset`, 'success');
            }
        }

        function deleteCandidate(username) {
            if(confirm(`Permanently delete ${username}?`)) {
                utils.showToast(`${username} deleted`, 'success');
            }
        }

        loadCandidates();
    </script>
</body>
</html>
